name: Raven Discipline Check
description: Enterprise AI coding discipline — CVE scan, secret detection, manifest validation, audit log. Platform-agnostic enforcement for every PR.
author: Giggso Inc

branding:
  icon: shield
  color: red

inputs:
  openai-api-key:
    description: OpenAI API key for CVE deep scan
    required: false
  manifest-path:
    description: Path to raven manifest.json
    required: false
    default: .raven/manifest.json
  raven-cve-model:
    description: OpenAI model for CVE analysis
    required: false
    default: gpt-4o
  audit-key:
    description: Encryption key for audit log
    required: false

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Raven core
      shell: bash
      run: |
        git clone https://github.com/giggsoinc/raven-core.git /tmp/raven-core
        pip install -r /tmp/raven-core/requirements.txt 2>/dev/null || true

    - name: Run Raven discipline check
      shell: bash
      run: python3 /tmp/raven-core/pr-gate.py
      env:
        RAVEN_MANIFEST_PATH: ${{ inputs.manifest-path }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        RAVEN_CVE_MODEL: ${{ inputs.raven-cve-model }}
        RAVEN_AUDIT_KEY: ${{ inputs.audit-key }}
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
