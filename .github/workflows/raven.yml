name: Raven Discipline Check
on: [pull_request]

jobs:
  raven:
    name: raven/discipline-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Raven
        run: |
          git clone https://github.com/giggsoinc/raven-core.git /tmp/raven-core
          pip install -r /tmp/raven-core/requirements.txt 2>/dev/null || true

      - name: Check manifest
        id: manifest
        run: |
          if [ -f ".raven/manifest.json" ]; then
            echo "manifest=found" >> $GITHUB_OUTPUT
          else
            echo "manifest=missing" >> $GITHUB_OUTPUT
            echo "⚠️ .raven/manifest.json not found"
          fi

      - name: Secret detection
        id: secrets
        if: steps.manifest.outputs.manifest == 'found'
        run: |
          python3 /tmp/raven-core/secret-scan.py --pr --changed-files-only
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}

      - name: CVE scan
        id: cve
        if: steps.manifest.outputs.manifest == 'found'
        run: |
          python3 /tmp/raven-core/cve-check.py --pr --changed-files-only
        env:
          RAVEN_CVE_MODEL: ${{ vars.RAVEN_CVE_MODEL || 'gpt-4o' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Validate manifest
        id: validate
        if: steps.manifest.outputs.manifest == 'found'
        run: |
          python3 -c "
          import json, sys
          with open('.raven/manifest.json') as f:
              m = json.load(f)
          required = ['project', 'stack', 'owner']
          missing = [k for k in required if k not in m]
          if missing:
              print(f'Manifest missing fields: {missing}')
              sys.exit(1)
          print('Manifest valid')
          "

      - name: Write audit log
        if: always()
        run: |
          python3 /tmp/raven-core/audit-log.py \
            --event "pr-gate" \
            --pr "${{ github.event.pull_request.number }}" \
            --actor "${{ github.actor }}" \
            --result "${{ job.status }}"
        env:
          RAVEN_AUDIT_KEY: ${{ secrets.RAVEN_AUDIT_KEY }}

      - name: Post status comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const manifest = '${{ steps.manifest.outputs.manifest }}';
            const secrets = '${{ steps.secrets.outcome }}';
            const cve = '${{ steps.cve.outcome }}';
            const validate = '${{ steps.validate.outcome }}';

            let status, icon, detail;

            if (manifest === 'missing') {
              icon = '⚠️'; status = 'did not run'; detail = 'manifest missing — run `raven-setup` or `raven-codex-setup` in your project';
            } else if (secrets === 'failure') {
              icon = '🔴'; status = 'blocked'; detail = 'Secret detected in changed files';
            } else if (cve === 'failure') {
              icon = '🔴'; status = 'blocked'; detail = 'CVE found in imported library';
            } else if (validate === 'failure') {
              icon = '🔴'; status = 'blocked'; detail = 'manifest.json validation failed';
            } else {
              icon = '✅'; status = 'passed'; detail = 'CVE scan clean · no secrets · manifest valid';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### ${icon} raven/discipline-check — ${status}\n\n${detail}\n\n---\n*[Raven Platform](https://github.com/giggsoinc/raven-action) · Platform-agnostic AI coding discipline*`
            });
